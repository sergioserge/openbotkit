apiVersion: apps/v1
kind: Deployment
metadata:
  name: obk-daemon
  namespace: openbotkit
spec:
  template:
    spec:
      containers:
        - name: obk
          env:
            - name: OBK_CONFIG_DIR
              value: /config
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: obk-credentials
                  key: database-url
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
